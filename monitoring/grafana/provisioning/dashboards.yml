# ─────────────────────────────────────────────────────────────
# Grafana Dashboard Provisioning — Sushi Queen
# ─────────────────────────────────────────────────────────────

apiVersion: 1

providers:
  - name: 'Sushi Queen'
    orgId: 1
    folder: 'Sushi Queen'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
