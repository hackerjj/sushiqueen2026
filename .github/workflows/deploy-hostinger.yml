name: Deploy to Hostinger

on:
  push:
    branches:
      - deploy-sushiqueen

jobs:
  deploy:
    name: Deploy Frontend to Hostinger
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: deploy-sushiqueen

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Deploy to Hostinger via FTP
        env:
          FTP_HOST: "191.101.79.184"
          FTP_USER: "u716757676.galt.com.mx"
          FTP_PASS: ${{ secrets.FTP_PASSWORD || '4Irbus0001!' }}
        run: |
          # Install lftp
          sudo apt-get update
          sudo apt-get install -y lftp
          
          # Deploy files
          lftp -u ${FTP_USER},${FTP_PASS} ftp://${FTP_HOST} <<EOF
          set ftp:ssl-allow no
          set net:timeout 30
          set net:max-retries 3
          cd public_html/sushiqueen
          mirror -R --delete --verbose ./frontend/dist/ ./
          put .htaccess
          bye
          EOF
          
          echo "✅ Files uploaded successfully"

      - name: Deployment summary
        run: |
          echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** deploy-sushiqueen" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL:** https://sushiqueen.galt.com.mx" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 Frontend deployed to Hostinger!" >> $GITHUB_STEP_SUMMARY
