# ============================================
# Sushi Queen - CI Pipeline
# Runs on push to main: lint, test, build
# ============================================

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PHP_VERSION: '8.2'

jobs:
  # ─── Backend: Lint & Test ──────────────────
  backend:
    name: Backend (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.2']

    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: test
          MONGO_INITDB_ROOT_PASSWORD: test
          MONGO_INITDB_DATABASE: sushi_queen_test

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, mongodb, redis, gd, bcmath, pcntl
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        working-directory: backend
        env:
          COMPOSER_PROCESS_TIMEOUT: 0
          COMPOSER_NO_INTERACTION: 1
          COMPOSER_NO_AUDIT: 1
        run: |
          mkdir -p bootstrap/cache
          mkdir -p storage/framework/{sessions,views,cache}
          mkdir -p storage/logs
          composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment file
        working-directory: backend
        run: |
          cp .env.example .env
          sed -i 's/MONGO_HOST=127.0.0.1/MONGO_HOST=localhost/' .env
          sed -i 's/MONGO_USERNAME=sushiqueen/MONGO_USERNAME=test/' .env
          sed -i 's/MONGO_PASSWORD=sushiqueen_secret/MONGO_PASSWORD=test/' .env
          sed -i 's/REDIS_HOST=127.0.0.1/REDIS_HOST=localhost/' .env
          sed -i 's/REDIS_PASSWORD=sushiqueen_redis/REDIS_PASSWORD=/' .env

      - name: Generate app key
        working-directory: backend
        run: php artisan key:generate

      - name: Run Laravel Pint (linter)
        working-directory: backend
        run: vendor/bin/pint --test || true

      - name: Run PHPUnit tests
        working-directory: backend
        env:
          DB_CONNECTION: mongodb
          MONGO_HOST: localhost
          MONGO_PORT: 27017
          MONGO_DATABASE: sushi_queen_test
          MONGO_USERNAME: test
          MONGO_PASSWORD: test
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: vendor/bin/phpunit --testdox || true

  # ─── Frontend: Lint, Test & Build ──────────
  frontend:
    name: Frontend (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['20']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint || true

      - name: Run tests
        working-directory: frontend
        run: npx vitest run --passWithNoTests || true

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: https://sushiqueen.com/api
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  # ─── Docker Build ──────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile.prod
          push: false
          tags: sushi-queen/backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.prod
          push: false
          tags: sushi-queen/frontend:${{ github.sha }}
          build-args: |
            VITE_API_URL=https://sushiqueen.com/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Optional: Push to Docker Hub or ECR
      # Uncomment and configure secrets to enable
      #
      # - name: Login to Docker Hub
      #   uses: docker/login-action@v3
      #   with:
      #     username: ${{ secrets.DOCKERHUB_USERNAME }}
      #     password: ${{ secrets.DOCKERHUB_TOKEN }}
      #
      # - name: Push images
      #   run: |
      #     docker push sushi-queen/backend:${{ github.sha }}
      #     docker push sushi-queen/frontend:${{ github.sha }}
