# Sushi Queen - CI Pipeline
name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  PHP_VERSION: '8.2'

jobs:
  # ─── Frontend: Build & Test ──────────
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run tests
        working-directory: frontend
        run: npx vitest run --passWithNoTests

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: https://sushiqueen.galt.com.mx/api
        run: npm run build

  # ─── Backend: Lint & Test ──────────
  backend:
    name: Backend
    runs-on: ubuntu-latest
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        env:
          MONGO_INITDB_ROOT_USERNAME: test
          MONGO_INITDB_ROOT_PASSWORD: test

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
          extensions: mbstring, mongodb, redis, gd, bcmath
          coverage: none

      - name: Install dependencies
        working-directory: backend
        run: |
          mkdir -p bootstrap/cache
          mkdir -p storage/framework/{sessions,views,cache}
          mkdir -p storage/logs
          composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Setup env
        working-directory: backend
        run: |
          cp .env.example .env
          sed -i 's/MONGO_HOST=127.0.0.1/MONGO_HOST=localhost/' .env
          sed -i 's/MONGO_USERNAME=sushiqueen/MONGO_USERNAME=test/' .env
          sed -i 's/MONGO_PASSWORD=sushiqueen_secret/MONGO_PASSWORD=test/' .env
          sed -i 's/REDIS_PASSWORD=sushiqueen_redis/REDIS_PASSWORD=/' .env
          php artisan key:generate

      - name: Run tests
        working-directory: backend
        run: vendor/bin/phpunit --testdox
