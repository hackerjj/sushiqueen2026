# ============================================
# Sushi Queen - Deployment Pipeline
# Manual trigger or on release
# ============================================

name: Deploy

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
      skip_build:
        description: 'Skip Docker build'
        required: false
        default: false
        type: boolean
      skip_migrations:
        description: 'Skip database migrations'
        required: false
        default: false
        type: boolean

  release:
    types: [published]

env:
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
  DEPLOY_PATH: /opt/sushi-queen

jobs:
  # ─── Run CI First ─────────────────────────
  ci:
    name: Run CI Checks
    uses: ./.github/workflows/ci.yml

  # ─── Deploy to Hostinger ───────────────────
  deploy:
    name: Deploy to ${{ github.event.inputs.environment || 'production' }}
    runs-on: ubuntu-latest
    needs: ci
    environment:
      name: ${{ github.event.inputs.environment || 'production' }}
      url: https://sushiqueen.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ env.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy via SSH
        run: |
          DEPLOY_FLAGS=""
          if [ "${{ github.event.inputs.skip_build }}" = "true" ]; then
            DEPLOY_FLAGS="$DEPLOY_FLAGS --skip-build"
          fi
          if [ "${{ github.event.inputs.skip_migrations }}" = "true" ]; then
            DEPLOY_FLAGS="$DEPLOY_FLAGS --skip-migrations"
          fi

          ssh ${{ env.DEPLOY_USER }}@${{ env.DEPLOY_HOST }} << ENDSSH
            cd ${{ env.DEPLOY_PATH }}
            git fetch origin main
            git checkout main
            git pull origin main
            chmod +x deploy/deploy.sh
            ./deploy/deploy.sh $DEPLOY_FLAGS
          ENDSSH

      - name: Verify deployment
        run: |
          sleep 15
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://sushiqueen.com/health || echo "000")
          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Deployment verified - Health check passed (HTTP $HTTP_STATUS)"
          else
            echo "⚠️ Health check returned HTTP $HTTP_STATUS"
            echo "The deployment may still be starting up..."
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check the logs at: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # ─── Post-Deploy Notification ──────────────
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: deploy
    if: always()

    steps:
      - name: Deployment summary
        run: |
          if [ "${{ needs.deploy.result }}" = "success" ]; then
            echo "## ✅ Deployment Successful" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Environment:** ${{ github.event.inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
            echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
            echo "- **URL:** https://sushiqueen.com" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ❌ Deployment Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> $GITHUB_STEP_SUMMARY
          fi
