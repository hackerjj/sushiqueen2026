name: Deploy to Render

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Trigger Render Deploy
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK" ]; then
            curl -X POST "$RENDER_DEPLOY_HOOK"
            echo "✅ Deploy triggered on Render"
          else
            echo "⚠️  RENDER_DEPLOY_HOOK secret not configured"
            echo "Configure it in: Settings > Secrets and variables > Actions"
            echo "Get your deploy hook from: Render Dashboard > Service > Settings > Deploy Hook"
          fi
