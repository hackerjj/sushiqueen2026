service: sushi-queen-api

frameworkVersion: '3'

provider:
  name: aws
  runtime: provided.al2
  region: us-east-1
  stage: ${opt:stage, 'dev'}
  environment:
    APP_ENV: ${self:provider.stage}
    MONGO_URI: ${env:MONGO_URI}
    REDIS_URL: ${env:REDIS_URL}
    JWT_SECRET: ${env:JWT_SECRET}
    FUDO_CLIENT_ID: ${env:FUDO_CLIENT_ID}
    FUDO_CLIENT_SECRET: ${env:FUDO_CLIENT_SECRET}
    GOOGLE_AI_API_KEY: ${env:GOOGLE_AI_API_KEY}
    WHATSAPP_ACCESS_TOKEN: ${env:WHATSAPP_ACCESS_TOKEN}
  
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: '*'

functions:
  api:
    handler: backend/public/index.php
    timeout: 28
    layers:
      - arn:aws:lambda:us-east-1:209497400698:layer:php-82-fpm:59
    events:
      - httpApi:
          path: /{proxy+}
          method: ANY
      - httpApi:
          path: /
          method: ANY

plugins:
  - ./vendor/bref/bref

package:
  patterns:
    - '!node_modules/**'
    - '!frontend/**'
    - '!tests/**'
    - '!.git/**'
    - 'backend/**'
