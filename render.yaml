services:
  # Frontend - React/Vite Static Site
  - type: web
    name: sushi-queen-frontend
    runtime: static
    buildCommand: cd frontend && npm install && npx vite build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: sushi-queen-backend
          property: hostport

  # Backend - PHP Laravel API (Docker)
  - type: web
    name: sushi-queen-backend
    runtime: docker
    region: oregon
    plan: free
    dockerfilePath: ./backend/Dockerfile.render
    dockerContext: ./backend
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: "10000"
      - key: MONGO_URI
        sync: false
      - key: REDIS_URL
        sync: false
      - key: FUDO_CLIENT_ID
        sync: false
      - key: FUDO_CLIENT_SECRET
        sync: false
      - key: GOOGLE_AI_API_KEY
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
