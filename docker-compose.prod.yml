# ============================================
# Sushi Queen - Production Docker Compose
# ============================================
# Usage: docker compose -f docker-compose.prod.yml up -d
# ============================================

services:
  # ─── MongoDB Database ────────────────────────
  mongodb:
    image: mongo:7
    container_name: sushi-queen-mongodb-prod
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE}
    volumes:
      - mongodb_prod_data:/data/db
    networks:
      - sushi-prod-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── Redis Cache ─────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sushi-queen-redis-prod
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_prod_data:/data
    networks:
      - sushi-prod-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 15s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─── PHP-FPM Backend ──────────────────────────
  php-fpm:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    image: sushi-queen/backend:latest
    container_name: sushi-queen-php-prod
    restart: always
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - MONGO_HOST=mongodb
      - MONGO_PORT=27017
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - sushi-prod-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ─── Nginx Reverse Proxy ─────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: sushi-queen-nginx-prod
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      php-fpm:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - sushi-prod-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # ─── Frontend (built into Nginx) ─────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_FB_PIXEL_ID: ${VITE_FB_PIXEL_ID:-}
        VITE_GA_ID: ${VITE_GA_ID:-}
        VITE_GTM_ID: ${VITE_GTM_ID:-}
        VITE_GOOGLE_ADS_ID: ${VITE_GOOGLE_ADS_ID:-}
        VITE_GOOGLE_ADS_CONVERSION_LABEL: ${VITE_GOOGLE_ADS_CONVERSION_LABEL:-}
        VITE_FB_DOMAIN_VERIFICATION: ${VITE_FB_DOMAIN_VERIFICATION:-}
    image: sushi-queen/frontend:latest
    container_name: sushi-queen-frontend-prod
    restart: always
    networks:
      - sushi-prod-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health"]
      interval: 15s
      timeout: 5s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # ─── Certbot (SSL) ──────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: sushi-queen-certbot
    restart: "no"
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - sushi-prod-network

volumes:
  mongodb_prod_data:
    driver: local
  redis_prod_data:
    driver: local

networks:
  sushi-prod-network:
    driver: bridge
