# ============================================
# Sushi Queen - Production Nginx Configuration
# SSL/TLS + Compression + Security Headers
# ============================================

# ─── Rate Limiting Zones ─────────────────────
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=order_limit:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=50r/s;

# ─── Upstream Definitions ────────────────────
upstream php_backend {
    server php-fpm:9000;
    keepalive 32;
}

upstream frontend_app {
    server frontend:80;
    keepalive 16;
}

# ─── HTTP → HTTPS Redirect ──────────────────
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Health check endpoint (no redirect)
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # Redirect all other HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS Server Block ─────────────────────
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name _;

    # ─── SSL/TLS Configuration ───────────────────
    ssl_certificate /etc/letsencrypt/live/sushiqueen.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sushiqueen.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/sushiqueen.com/chain.pem;

    # Modern SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # ─── Security Headers ────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://connect.facebook.net https://googleads.g.doubleclick.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: blob:; connect-src 'self' https://www.google-analytics.com https://graph.facebook.com https://api.fu.do; frame-src https://www.facebook.com https://td.doubleclick.net;" always;

    # ─── Gzip Compression ────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/vnd.ms-fontobject
        application/x-font-ttf
        font/opentype
        image/svg+xml
        image/x-icon;

    # ─── Brotli Compression (if module available) ─
    # brotli on;
    # brotli_comp_level 6;
    # brotli_static on;
    # brotli_types text/plain text/css text/xml text/javascript
    #     application/json application/javascript application/xml
    #     application/xml+rss application/vnd.ms-fontobject
    #     application/x-font-ttf font/opentype image/svg+xml;

    # ─── General Settings ────────────────────────
    client_max_body_size 10M;
    client_body_timeout 30s;
    client_header_timeout 30s;
    send_timeout 30s;
    keepalive_timeout 65;
    keepalive_requests 100;

    # ─── Logging ─────────────────────────────────
    access_log /var/log/nginx/access.log combined buffer=512k flush=1m;
    error_log /var/log/nginx/error.log warn;

    # ─── Health Check ────────────────────────────
    location /health {
        access_log off;
        return 200 'OK';
        add_header Content-Type text/plain;
    }

    # ─── API Proxy to PHP-FPM ────────────────────
    location /api {
        limit_req zone=api_limit burst=20 nodelay;

        # Rewrite to Laravel public/index.php
        try_files $uri $uri/ /index.php?$query_string;
        root /var/www/backend/public;

        location ~ \.php$ {
            fastcgi_pass php_backend;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
            include fastcgi_params;
            fastcgi_param PATH_INFO $fastcgi_path_info;

            # Timeouts
            fastcgi_connect_timeout 30s;
            fastcgi_send_timeout 60s;
            fastcgi_read_timeout 60s;
            fastcgi_buffer_size 32k;
            fastcgi_buffers 8 16k;

            # Hide PHP version
            fastcgi_hide_header X-Powered-By;
        }
    }

    # ─── Login Rate Limiting ─────────────────────
    location /api/auth/login {
        limit_req zone=login_limit burst=3 nodelay;

        try_files $uri $uri/ /index.php?$query_string;
        root /var/www/backend/public;

        location ~ \.php$ {
            fastcgi_pass php_backend;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
            include fastcgi_params;
            fastcgi_hide_header X-Powered-By;
        }
    }

    # ─── Order Rate Limiting ─────────────────────
    location = /api/orders {
        limit_req zone=order_limit burst=5 nodelay;

        try_files $uri $uri/ /index.php?$query_string;
        root /var/www/backend/public;

        location ~ \.php$ {
            fastcgi_pass php_backend;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
            include fastcgi_params;
            fastcgi_hide_header X-Powered-By;
        }
    }

    # ─── Webhooks Proxy ──────────────────────────
    location /webhooks {
        try_files $uri $uri/ /index.php?$query_string;
        root /var/www/backend/public;

        location ~ \.php$ {
            fastcgi_pass php_backend;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME /var/www/backend/public/index.php;
            include fastcgi_params;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_hide_header X-Powered-By;
        }
    }

    # ─── Static Assets (1 year cache) ────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif|mp4|webm)$ {
        proxy_pass http://frontend_app;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        access_log off;
    }

    # ─── Frontend SPA (proxy to frontend container) ─
    location / {
        limit_req zone=general_limit burst=30 nodelay;
        proxy_pass http://frontend_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Deny Hidden Files ───────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ─── Deny Access to Sensitive Files ──────────
    location ~* \.(env|git|htaccess|htpasswd|ini|log|sh|sql|conf|bak|swp)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ─── Favicon ─────────────────────────────────
    location = /favicon.ico {
        access_log off;
        log_not_found off;
    }

    # ─── Robots.txt ──────────────────────────────
    location = /robots.txt {
        access_log off;
        log_not_found off;
    }
}
