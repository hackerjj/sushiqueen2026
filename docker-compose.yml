services:
  # MongoDB Database
  mongodb:
    image: mongo:7
    container_name: sushi-queen-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-sushiqueen}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-sushiqueen_secret}
      MONGO_INITDB_DATABASE: ${MONGO_DATABASE:-sushi_queen}
    volumes:
      - mongodb_data:/data/db
    networks:
      - sushi-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: sushi-queen-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-sushiqueen_redis}
    volumes:
      - redis_data:/data
    networks:
      - sushi-network

  # PHP-FPM Backend
  php-fpm:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: sushi-queen-php
    restart: unless-stopped
    working_dir: /var/www/backend
    volumes:
      - ./backend:/var/www/backend
    depends_on:
      - mongodb
      - redis
    environment:
      - APP_ENV=${APP_ENV:-local}
      - MONGO_HOST=mongodb
      - REDIS_HOST=redis
    networks:
      - sushi-network

  # Nginx Web Server
  nginx:
    image: nginx:1.25-alpine
    container_name: sushi-queen-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./frontend/dist:/var/www/frontend
      - ./backend/public:/var/www/backend/public
    depends_on:
      - php-fpm
    networks:
      - sushi-network

  # Node.js for Frontend Build
  node:
    image: node:20-alpine
    container_name: sushi-queen-node
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run build"
    networks:
      - sushi-network

  # ─── Monitoring & Observability ─────────────────────────────────

  # Prometheus — Metrics collection
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: sushi-queen-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    depends_on:
      - nginx
    networks:
      - sushi-network

  # Grafana — Dashboards & Visualization
  grafana:
    image: grafana/grafana:10.4.0
    container_name: sushi-queen-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-sushiqueen}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3001
    volumes:
      - ./monitoring/grafana/provisioning/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./monitoring/grafana/provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - sushi-network

  # MongoDB Exporter — Exports MongoDB metrics for Prometheus
  mongodb-exporter:
    image: percona/mongodb_exporter:0.40.0
    container_name: sushi-queen-mongodb-exporter
    restart: unless-stopped
    ports:
      - "9216:9216"
    environment:
      - MONGODB_URI=mongodb://${MONGO_USERNAME:-sushiqueen}:${MONGO_PASSWORD:-sushiqueen_secret}@mongodb:27017/admin
    depends_on:
      - mongodb
    networks:
      - sushi-network

  # Redis Exporter — Exports Redis metrics for Prometheus
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    container_name: sushi-queen-redis-exporter
    restart: unless-stopped
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-sushiqueen_redis}
    depends_on:
      - redis
    networks:
      - sushi-network

  # Nginx Exporter — Exports Nginx stub_status metrics for Prometheus
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.1.0
    container_name: sushi-queen-nginx-exporter
    restart: unless-stopped
    ports:
      - "9113:9113"
    command:
      - '--nginx.scrape-uri=http://nginx:80/nginx_status'
    depends_on:
      - nginx
    networks:
      - sushi-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  sushi-network:
    driver: bridge
